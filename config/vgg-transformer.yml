# for training
pretrain: none

# url or local path (predict)
weights: weight/vgg_transformer.pth
# weights: weight/transformerocr_1.pth
# weights: weight/transformerocr_2.pth
weights: weight/transformerocr_3.pth

backbone: vgg19_bn
cnn:
    pretrained: True
    # pooling stride size
    ss:
        - [2, 2]
        - [2, 2]
        - [2, 1]
        - [2, 1]
        - [1, 1]         
    # pooling kernel size 
    ks:
        - [2, 2]
        - [2, 2]
        - [2, 1]
        - [2, 1]
        - [1, 1]
    # dim of ouput feature map
    hidden: 256

